<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPU Cluster Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #181b24;
    --border: #262a36;
    --text: #e1e4eb;
    --dim: #6b7280;
    --accent: #3b82f6;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --cyan: #06b6d4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #1e2433 0%, #0f1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }
  .header h1 span { color: var(--accent); }
  .header-stats {
    display: flex;
    gap: 24px;
    font-size: 13px;
    color: var(--dim);
  }
  .header-stats .val { color: var(--text); font-weight: 600; }
  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  .status-dot.online { background: var(--green); }
  .status-dot.offline { background: var(--red); }
  .status-dot.stale { background: var(--yellow); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .container { padding: 20px 32px; }

  .summary-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
  }
  .summary-card .label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }
  .summary-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
  .summary-card .sub { font-size: 12px; color: var(--dim); margin-top: 2px; }

  .chart-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .chart-section h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
  .chart-container { position: relative; height: 220px; }

  .nodes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
    gap: 16px;
  }
  .node-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    transition: border-color 0.2s;
  }
  .node-card:hover { border-color: var(--accent); }
  .node-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .node-name { font-size: 14px; font-weight: 600; }
  .node-meta { font-size: 11px; color: var(--dim); }

  .gpu-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .gpu-table th {
    text-align: left;
    color: var(--dim);
    font-weight: 500;
    padding: 4px 8px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .gpu-table td { padding: 5px 8px; }
  .gpu-table tr:hover td { background: rgba(59,130,246,0.05); }

  .bar-cell { width: 120px; }
  .bar-track {
    width: 100%;
    height: 14px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }
  .bar-fill.low { background: linear-gradient(90deg, #06b6d4, #22c55e); }
  .bar-fill.med { background: linear-gradient(90deg, #22c55e, #eab308); }
  .bar-fill.high { background: linear-gradient(90deg, #eab308, #f97316); }
  .bar-fill.crit { background: linear-gradient(90deg, #f97316, #ef4444); }

  .pct { font-weight: 600; font-variant-numeric: tabular-nums; }
  .pct.low { color: var(--cyan); }
  .pct.med { color: var(--green); }
  .pct.high { color: var(--yellow); }
  .pct.crit { color: var(--red); }

  .temp { font-variant-numeric: tabular-nums; }
  .power { font-variant-numeric: tabular-nums; }

  .server-info {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 24px;
  }
  .server-info h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
  .server-info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }
  .si-item {
    padding: 10px 12px;
    background: rgba(255,255,255,0.02);
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.04);
  }
  .si-item .si-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.8px; }
  .si-item .si-val { font-size: 18px; font-weight: 700; margin-top: 2px; font-variant-numeric: tabular-nums; }

  .host-stats {
    display: flex;
    gap: 16px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .host-stat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
  }
  .host-stat .hs-label { color: var(--dim); }
  .host-stat .hs-val { font-weight: 600; font-variant-numeric: tabular-nums; }
  .host-stat .hs-bar {
    width: 60px;
    height: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }
  .host-stat .hs-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  .ctr-section { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
  .ctr-section h3 { font-size: 12px; color: var(--dim); font-weight: 500; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .ctr-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 8px;
    border-radius: 4px;
    font-size: 12px;
    background: rgba(255,255,255,0.02);
    margin-bottom: 4px;
    flex-wrap: wrap;
  }
  .ctr-name { font-weight: 600; color: var(--accent); }
  .ctr-gpu-tag {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    background: rgba(59,130,246,0.15);
    color: var(--accent);
    margin-right: 2px;
  }
  .ctr-meta { color: var(--dim); font-size: 11px; }
  .ctr-user { color: var(--green); font-weight: 600; }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--dim);
  }
  .empty-state h2 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
  .empty-state p { font-size: 14px; }
  .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <h1><span>&#9632;</span> GPU Cluster Monitor</h1>
  <div class="header-stats">
    <div><span class="status-dot online" id="status-dot"></span><span id="hdr-status">Connecting...</span></div>
    <div>Nodes: <span class="val" id="hdr-nodes">0</span></div>
    <div>GPUs: <span class="val" id="hdr-gpus">0</span></div>
    <div>Refresh: <span class="val" id="hdr-refresh">15s</span></div>
  </div>
</div>

<div class="container">
  <div class="summary-row">
    <div class="summary-card">
      <div class="label">Avg GPU Utilization</div>
      <div class="value" id="sum-gpu-util" style="color:var(--cyan)">—</div>
      <div class="sub" id="sum-gpu-util-sub"></div>
    </div>
    <div class="summary-card">
      <div class="label">Avg Memory Used</div>
      <div class="value" id="sum-mem" style="color:var(--green)">—</div>
      <div class="sub" id="sum-mem-sub"></div>
    </div>
    <div class="summary-card">
      <div class="label">Total Power</div>
      <div class="value" id="sum-power" style="color:var(--yellow)">—</div>
      <div class="sub" id="sum-power-sub"></div>
    </div>
    <div class="summary-card">
      <div class="label">Active GPUs</div>
      <div class="value" id="sum-active" style="color:var(--accent)">—</div>
      <div class="sub" id="sum-active-sub"></div>
    </div>
  </div>

  <div class="chart-section">
    <h2>GPU Utilization History (per node avg)</h2>
    <div class="chart-container"><canvas id="chart-util"></canvas></div>
  </div>
  <div class="chart-section">
    <h2>Memory Usage History (per node avg %)</h2>
    <div class="chart-container"><canvas id="chart-mem"></canvas></div>
  </div>

  <div id="server-info" class="server-info" style="display:none">
    <h2>Server Process</h2>
    <div class="server-info-grid" id="si-grid"></div>
  </div>

  <div id="nodes-container" class="nodes-grid"></div>
  <div id="empty-state" class="empty-state">
    <div class="spinner"></div>
    <h2>Waiting for GPU nodes...</h2>
    <p>Agents will report in within 60 seconds.</p>
  </div>
</div>

<script>
const REFRESH_MS = 15000;
const NODE_COLORS = [
  '#3b82f6','#22c55e','#eab308','#ef4444',
  '#8b5cf6','#06b6d4','#f97316','#ec4899'
];

let chartUtil, chartMem;

function initCharts() {
  const commonOpts = {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 400 },
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { position: 'bottom', labels: { color: '#6b7280', font: { size: 11, family: 'JetBrains Mono, monospace' }, boxWidth: 12, padding: 16 } },
    },
    scales: {
      x: { ticks: { color: '#6b7280', font: { size: 10 }, maxTicksLimit: 20 }, grid: { color: 'rgba(255,255,255,0.04)' } },
      y: { min: 0, max: 100, ticks: { color: '#6b7280', font: { size: 10 }, callback: v => v + '%' }, grid: { color: 'rgba(255,255,255,0.04)' } },
    },
  };

  chartUtil = new Chart(document.getElementById('chart-util'), {
    type: 'line',
    data: { labels: [], datasets: [] },
    options: { ...commonOpts, plugins: { ...commonOpts.plugins, title: { display: false } } },
  });
  chartMem = new Chart(document.getElementById('chart-mem'), {
    type: 'line',
    data: { labels: [], datasets: [] },
    options: { ...commonOpts, plugins: { ...commonOpts.plugins, title: { display: false } } },
  });
}

function pctClass(v) {
  if (v >= 90) return 'crit';
  if (v >= 70) return 'high';
  if (v >= 30) return 'med';
  return 'low';
}

function fmtGiB(bytes) { return (bytes / (1024**3)).toFixed(1); }

function renderNodeCard(hostname, data) {
  const lat = data.latest;
  if (!lat) return '';
  const age = (Date.now()/1000 - lat.timestamp);
  const stale = age > 180;
  const statusCls = stale ? 'stale' : 'online';
  const ageStr = age < 60 ? `${age.toFixed(0)}s ago` : `${(age/60).toFixed(0)}m ago`;
  const shortName = hostname;

  let rows = '';
  for (const g of lat.gpus) {
    const uCls = pctClass(g.gpu_util);
    const mCls = pctClass(g.mem_util_pct);
    rows += `<tr>
      <td style="color:var(--dim)">GPU${g.id}</td>
      <td class="pct ${uCls}">${g.gpu_util}%</td>
      <td class="bar-cell"><div class="bar-track"><div class="bar-fill ${uCls}" style="width:${g.gpu_util}%"></div></div></td>
      <td class="pct ${mCls}">${g.mem_util_pct}%</td>
      <td class="bar-cell"><div class="bar-track"><div class="bar-fill ${mCls}" style="width:${g.mem_util_pct}%"></div></div></td>
      <td style="font-variant-numeric:tabular-nums">${fmtGiB(g.vram_used_bytes)}/${fmtGiB(g.vram_total_bytes)}</td>
      <td class="temp">${g.temp_junction.toFixed(0)}°C</td>
      <td class="power">${g.power_w.toFixed(0)}W</td>
    </tr>`;
  }

  const h_info = lat.host || {};
  const cpuPct = h_info.cpu_util_pct || 0;
  const memPct = h_info.mem_used_pct || 0;
  const cpuCls = pctClass(cpuPct);
  const memHCls = pctClass(memPct);
  const cpuColor = cpuPct >= 90 ? 'var(--red)' : cpuPct >= 70 ? 'var(--yellow)' : cpuPct >= 30 ? 'var(--green)' : 'var(--cyan)';
  const memHColor = memPct >= 90 ? 'var(--red)' : memPct >= 70 ? 'var(--yellow)' : memPct >= 30 ? 'var(--green)' : 'var(--cyan)';

  const hostStats = h_info.cpu_cores ? `<div class="host-stats">
    <div class="host-stat">
      <span class="hs-label">CPU</span>
      <span class="hs-val" style="color:${cpuColor}">${cpuPct.toFixed(0)}%</span>
      <div class="hs-bar"><div class="hs-bar-fill bar-fill ${cpuCls}" style="width:${Math.min(cpuPct,100)}%"></div></div>
      <span style="color:var(--dim);font-size:11px">${h_info.cpu_cores} cores, load ${(h_info.load_1||0).toFixed(0)}</span>
    </div>
    <div class="host-stat">
      <span class="hs-label">RAM</span>
      <span class="hs-val" style="color:${memHColor}">${memPct.toFixed(0)}%</span>
      <div class="hs-bar"><div class="hs-bar-fill bar-fill ${memHCls}" style="width:${memPct}%"></div></div>
      <span style="color:var(--dim);font-size:11px">${h_info.mem_used_gb||0}/${h_info.mem_total_gb||0} GB</span>
    </div>
    <div class="host-stat">
      <span class="hs-label">Procs</span>
      <span class="hs-val" style="color:var(--text)">${h_info.procs_running||0}/${h_info.procs_total||0}</span>
    </div>
  </div>` : '';

  const ctrs = (h_info.containers || []);
  let ctrHtml = '';
  if (ctrs.length) {
    const ctrRows = ctrs.map(c => {
      const gpuTags = c.gpus.length
        ? c.gpus.map(g => `<span class="ctr-gpu-tag">GPU${g}</span>`).join('')
        : '<span class="ctr-meta">no GPU</span>';
      return `<div class="ctr-row">
        <span class="ctr-name">${c.name}</span>
        <span>${gpuTags}</span>
        <span class="ctr-meta">${c.image}</span>
        <span class="ctr-user">${c.user}</span>
        <span class="ctr-meta">since ${c.started}</span>
      </div>`;
    }).join('');
    ctrHtml = `<div class="ctr-section"><h3>Containers</h3>${ctrRows}</div>`;
  }

  return `<div class="node-card">
    <div class="node-header">
      <div class="node-name"><span class="status-dot ${statusCls}"></span>${shortName}</div>
      <div class="node-meta">${lat.gpu_count} GPUs &middot; ${ageStr}</div>
    </div>
    ${hostStats}
    <table class="gpu-table">
      <tr><th></th><th>Util</th><th></th><th>Mem</th><th></th><th>VRAM</th><th>Temp</th><th>Power</th></tr>
      ${rows}
    </table>
    ${ctrHtml}
  </div>`;
}

function updateCharts(allData) {
  const hostnames = Object.keys(allData).sort();
  if (!hostnames.length) return;

  const maxLen = Math.max(...hostnames.map(h => (allData[h].history || []).length));
  const labels = [];
  for (let i = 0; i < maxLen; i++) {
    const first = hostnames.find(h => allData[h].history && allData[h].history[i]);
    if (first && allData[first].history[i].timestamp) {
      const d = new Date(allData[first].history[i].timestamp * 1000);
      labels.push(d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
    } else {
      labels.push('');
    }
  }

  const utilDatasets = [];
  const memDatasets = [];
  hostnames.forEach((h, idx) => {
    const hist = allData[h].history || [];
    const shortName = h;
    const color = NODE_COLORS[idx % NODE_COLORS.length];

    const utilArr = hist.map(snap => {
      if (!snap.gpus || !snap.gpus.length) return null;
      return snap.gpus.reduce((s, g) => s + g.gpu_util, 0) / snap.gpus.length;
    });
    const memArr = hist.map(snap => {
      if (!snap.gpus || !snap.gpus.length) return null;
      return snap.gpus.reduce((s, g) => s + g.mem_util_pct, 0) / snap.gpus.length;
    });

    const dsCfg = {
      label: shortName,
      borderColor: color,
      backgroundColor: color + '20',
      borderWidth: 1.5,
      pointRadius: 0,
      tension: 0.3,
      fill: false,
    };
    utilDatasets.push({ ...dsCfg, data: utilArr });
    memDatasets.push({ ...dsCfg, data: memArr });
  });

  chartUtil.data.labels = labels;
  chartUtil.data.datasets = utilDatasets;
  chartUtil.update('none');

  chartMem.data.labels = labels;
  chartMem.data.datasets = memDatasets;
  chartMem.update('none');
}

function updateSummary(allData) {
  let totalGpuUtil = 0, totalMemPct = 0, totalPower = 0, totalGpus = 0, activeGpus = 0, nodeCount = 0;
  for (const [h, nd] of Object.entries(allData)) {
    if (!nd.latest) continue;
    nodeCount++;
    for (const g of nd.latest.gpus) {
      totalGpuUtil += g.gpu_util;
      totalMemPct += g.mem_util_pct;
      totalPower += g.power_w;
      totalGpus++;
      if (g.gpu_util > 0) activeGpus++;
    }
  }
  const avgUtil = totalGpus ? (totalGpuUtil / totalGpus) : 0;
  const avgMem = totalGpus ? (totalMemPct / totalGpus) : 0;

  document.getElementById('sum-gpu-util').textContent = avgUtil.toFixed(1) + '%';
  document.getElementById('sum-gpu-util-sub').textContent = `across ${totalGpus} GPUs on ${nodeCount} nodes`;
  document.getElementById('sum-mem').textContent = avgMem.toFixed(1) + '%';
  document.getElementById('sum-mem-sub').textContent = `avg VRAM allocation`;
  document.getElementById('sum-power').textContent = (totalPower/1000).toFixed(1) + ' kW';
  document.getElementById('sum-power-sub').textContent = `${totalPower.toFixed(0)}W total`;
  document.getElementById('sum-active').textContent = `${activeGpus}/${totalGpus}`;
  document.getElementById('sum-active-sub').textContent = `GPUs with >0% util`;
  document.getElementById('hdr-nodes').textContent = nodeCount;
  document.getElementById('hdr-gpus').textContent = totalGpus;
}

function renderServerInfo(info) {
  const el = document.getElementById('server-info');
  el.style.display = '';
  const items = [
    { label: 'Hostname', val: info.hostname, color: 'var(--text)' },
    { label: 'PID', val: info.pid, color: 'var(--dim)' },
    { label: 'Uptime', val: info.uptime_str, color: 'var(--cyan)' },
    { label: 'RSS Memory', val: info.rss_mb + ' MB', color: info.rss_mb > 200 ? 'var(--yellow)' : 'var(--green)' },
    { label: 'Peak RSS', val: info.max_rss_mb + ' MB', color: 'var(--dim)' },
    { label: 'CPU Usage', val: info.cpu_pct + '%', color: info.cpu_pct > 10 ? 'var(--yellow)' : 'var(--green)' },
    { label: 'Threads', val: info.threads, color: 'var(--text)' },
    { label: 'Open FDs', val: info.open_fds, color: info.open_fds > 100 ? 'var(--yellow)' : 'var(--text)' },
    { label: 'Nodes Tracked', val: info.node_count, color: 'var(--accent)' },
    { label: 'History Entries', val: info.history_entries, color: 'var(--text)' },
    { label: 'Last Collect', val: info.last_collect_ms + 'ms', color: info.last_collect_ms > 5000 ? 'var(--yellow)' : 'var(--green)' },
    { label: 'Ctx Switches', val: (info.voluntary_ctx_switches + info.involuntary_ctx_switches).toLocaleString(), color: 'var(--dim)' },
  ];
  document.getElementById('si-grid').innerHTML = items.map(i =>
    `<div class="si-item"><div class="si-label">${i.label}</div><div class="si-val" style="color:${i.color}">${i.val}</div></div>`
  ).join('');
}

async function fetchData() {
  try {
    const [dataResp, siResp] = await Promise.all([
      fetch('/api/data'),
      fetch('/api/server_info'),
    ]);
    const allData = await dataResp.json();
    const serverInfo = await siResp.json();
    const hostnames = Object.keys(allData).sort();

    document.getElementById('status-dot').className = 'status-dot online';
    document.getElementById('hdr-status').textContent = 'Live';

    renderServerInfo(serverInfo);

    if (!hostnames.length) {
      document.getElementById('empty-state').style.display = '';
      document.getElementById('nodes-container').innerHTML = '';
      return;
    }

    document.getElementById('empty-state').style.display = 'none';

    let html = '';
    for (const h of hostnames) html += renderNodeCard(h, allData[h]);
    document.getElementById('nodes-container').innerHTML = html;

    updateSummary(allData);
    updateCharts(allData);
  } catch (e) {
    document.getElementById('status-dot').className = 'status-dot offline';
    document.getElementById('hdr-status').textContent = 'Disconnected';
  }
}

initCharts();
fetchData();
setInterval(fetchData, REFRESH_MS);
</script>
</body>
</html>
